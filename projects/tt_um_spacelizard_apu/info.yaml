# Tiny Tapeout project information
project:
  title:        "Spacelizard APU"      # Project title
  author:       "Steve W."      # Your name
  discord:      "spacedog_recube"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Tiny 8-bit arithmetic processing unit with registers, flags, RAM, and bus interface"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     1000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_spacelizard_apu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "ARG0"
  ui[1]: "ARG1"
  ui[2]: "ARG2"
  ui[3]: "ARG3"
  ui[4]: "OP0"
  ui[5]: "OP1"
  ui[6]: "OP2"
  ui[7]: "EXEC"

  # Outputs
  uo[0]: "A0"
  uo[1]: "A1"
  uo[2]: "A2"
  uo[3]: "A3"
  uo[4]: "A4"
  uo[5]: "A5"
  uo[6]: "A6"
  uo[7]: "A7"

  # Bidirectional pins
  uio[0]: "DATA0"
  uio[1]: "DATA1"
  uio[2]: "DATA2"
  uio[3]: "DATA3"
  uio[4]: "DATA4"
  uio[5]: "DATA5"
  uio[6]: "DATA6"
  uio[7]: "DATA7"

# Do not change!
yaml_version: 6
