  ui[5]: ""
  ui[6]: "not1:IN"
  ui[7]: ""

  # Outputs
  uo[0]: "and1:OUT"
  uo[1]: "nor1:OUT"
  uo[2]: "xor1:OUT"
  uo[3]: "not2:OUT"
  uo[4]: ""
  uo[5]: ""
